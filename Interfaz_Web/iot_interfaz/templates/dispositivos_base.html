{% extends 'base.html' %}

{% block content %}
<div class="flex h-screen bg-gray-900 overflow-hidden">
    
    <div class="bg-gray-800 border-r border-gray-700 !flex flex-col p-4" style="height: 100vh; position: sticky; top: 0; overflow-y: auto; width: 200px; flex-shrink: 0;">

        <div class="p-1 border-b border-gray-700 mb-4">
            <h6 class="text-white uppercase tracking-widest text-[0.7rem] font-bold m-2 flex items-center gap-3">

                Gestión de Dispositivos
            </h6>
        </div>

        <hr class="border-gray-700 mb-6">

        <ul class="!flex flex-col gap-2 flex-grow p-0 m-0" style="list-style: none;">
            
            <li>
                <a hx-get="{% url 'dispositivos_lista' %}" 
                hx-target="#contenido-principal"
                hx-select="#contenido-principal"
                hx-push-url="true"
                class="menu-item !flex items-center gap-3 px-4 py-3 rounded-xl !text-gray-300 font-medium transition-all duration-200 hover:bg-gray-700 hover:!text-white cursor-pointer group {% if request.resolver_match.url_name == 'dispositivos_lista' %}activo{% endif %}"
                style="text-decoration: none;">
                    <svg class="w-5 h-5 !text-gray-400 group-hover:!text-blue-400 transition-colors flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21h8M12 17v4M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                    <span class="text-sm">Monitor</span>
                </a>
            </li>
            
            <li>
                <a hx-get="{% url 'grupos_modelos' %}" 
                hx-target="#contenido-principal"
                hx-select="#contenido-principal"
                hx-push-url="true"
                class="menu-item !flex items-center gap-3 px-4 py-3 rounded-xl !text-gray-300 font-medium transition-all duration-200 hover:bg-gray-700 hover:!text-white cursor-pointer group {% if request.resolver_match.url_name == 'grupos_modelos' %}activo{% endif %}"
                style="text-decoration: none;">
                    <svg class="w-5 h-5 !text-gray-400 group-hover:!text-blue-400 transition-colors flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                    <span class="text-sm">Grupos y Modelos</span>
                </a>
            </li>
            
            <li>
                <a hx-get="{% url 'log_capture' %}" 
                hx-target="#contenido-principal"
                hx-select="#contenido-principal"
                hx-push-url="true"
                class="menu-item !flex items-center gap-3 px-4 py-3 rounded-xl !text-gray-300 font-medium transition-all duration-200 hover:bg-gray-700 hover:!text-white cursor-pointer group {% if request.resolver_match.url_name == 'log_capture' %}activo{% endif %}"
                style="text-decoration: none;">
                    <svg class="w-5 h-5 !text-gray-400 group-hover:!text-blue-400 transition-colors flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                    </svg>
                    <span class="text-sm">Log Capture</span>
                </a>
            </li>
            
        </ul>
    </div>

    <div class="flex-grow bg-gray-900 overflow-auto p-8">
        {% block dispositivos_content %}
        {% endblock %}
    </div>
</div>
{% endblock %}
