{% extends 'base.html' %}

{% block content %}

<style>
    .nav-pills .nav-link:not(.active):hover {
        background-color: #e9ecef;
        color: #0d6efd !important;
        transition: background-color 0.2s ease-in-out;
        border-radius: 0.25rem;
    }
</style>

<div class="d-flex h-100">
    <div class="bg-white border-end shadow-sm" style="width: 200px; min-height: 80vh;">
        <div class="p-3">
            <h6 class="text-muted text-uppercase fw-bold" style="font-size: 0.8rem;">Gestión de Dispositivos</h6>
            <ul class="nav nav-pills flex-column mt-2">
                <li class="nav-item">
                    <a href="{% url 'dispositivos_lista' %}" class="nav-link {% if request.resolver_match.url_name == 'dispositivos_lista' %}active{% else %}text-dark{% endif %}">
                        Monitor en Tiempo Real
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'grupos_modelos' %}" class="nav-link {% if request.resolver_match.url_name == 'grupos_modelos' %}active{% else %}text-dark{% endif %}">
                        Grupos y Modelos
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'log_capture' %}" class="nav-link {% if request.resolver_match.url_name == 'log_capture' %}active{% else %}text-dark{% endif %}">
                        Log Capture
                    </a>
                </li>
            </ul>
        </div>

        <div class="p-3 mt-auto">
            <hr class="text-muted mb-3"> <a href="{% url 'dashboard' %}" class="btn btn-sm btn-light border w-100 text-center shadow-sm text-secondary fw-bold">
                Volver a Dashboard
            </a>
        </div>
    </div>

    <div class="flex-grow-1 bg-white">
        {% block dispositivos_content %}
        {% endblock %}
    </div>
</div>
{% endblock %}
