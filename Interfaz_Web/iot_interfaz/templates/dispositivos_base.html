{% extends 'base.html' %}

{% block content %}

<style>
    .nav-pills .nav-link:not(.active):hover {
        background-color: #e9ecef;
        color: #0d6efd !important;
        transition: background-color 0.2s ease-in-out;
        border-radius: 0.25rem;
    }
</style>

<div class="d-flex flex-column flex-md-row h-100">
    <div class="bg-white border-end shadow-sm" style="width: 200px; min-height: 80vh;">
        <div class="p-3">
            <h6 class="text-muted text-uppercase fw-bold" style="font-size: 0.8rem;">Gestión de Dispositivos</h6>
            <ul class="nav nav-pills flex-column mt-2">
                <li class="nav-item">
                    <a hx-get="{% url 'dispositivos_lista' %}" 
                       hx-target="#contenido-principal"
                       hx-select="#contenido-principal"
                       hx-push-url="true"
                       class="nav-link {% if request.resolver_match.url_name == 'dispositivos_lista' %}active bg-primary text-white{% else %}text-dark{% endif %}" 
                       style="cursor: pointer;">
                       Monitor en Tiempo Real
                    </a>
                </li>
                <li class="nav-item">
                    <a hx-get="{% url 'grupos_modelos' %}" 
                    hx-target="#contenido-principal"
                    hx-select="#contenido-principal"
                    hx-push-url="true"
                    class="nav-link {% if request.resolver_match.url_name == 'grupos_modelos' %}active bg-primary text-white{% else %}text-dark{% endif %}" 
                    style="cursor: pointer;">
                    Grupos y Modelos
                    </a>
                </li>
                <li class="nav-item">
                    <a hx-get="{% url 'log_capture' %}" 
                    hx-target="#contenido-principal"
                    hx-select="#contenido-principal"
                    hx-push-url="true"
                    class="nav-link {% if request.resolver_match.url_name == 'log_capture' %}active bg-primary text-white{% else %}text-dark{% endif %}" 
                    style="cursor: pointer;">
                    Log Capture
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <div class="flex-grow-1 bg-white">
        {% block dispositivos_content %}
        {% endblock %}
    </div>
</div>
{% endblock %}
