{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor IIoT | The Factory HKA</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    {% tailwind_css %}
</head>
<body class="font-sans bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen">

    
    <div class="bg-gray-800 border-t-2 border-blue-600 rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.5)] max-w-xl text-center mx-4 p-12 md:p-16">
        
        <div class="mb-10 inline-flex items-center justify-center w-24 h-24 bg-blue-950 rounded-full border border-blue-800 shadow-inner">
            <svg class="w-12 h-12 text-blue-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                <rect x="9" y="9" width="6" height="6"></rect>
                <line x1="15" y1="2" x2="15" y2="4"></line>
                <line x1="9" y1="2" x2="9" y2="4"></line>
                <line x1="15" y1="20" x2="15" y2="22"></line>
                <line x1="9" y1="20" x2="9" y2="22"></line>
                <line x1="22" y1="15" x2="20" y2="15"></line>
                <line x1="22" y1="9" x2="20" y2="9"></line>
                <line x1="4" y1="15" x2="2" y2="15"></line>
                <line x1="4" y1="9" x2="2" y2="9"></line>
            </svg>
        </div>
        
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-5 leading-tight">
            Plataforma de Monitoreo <br>
            <span class="text-blue-500">The Factory HKA</span> 
        </h1>

        <p class="text-gray-300 mb-10 leading-relaxed">
            Sistema centralizado de telemetría y actualización remota.
        </p>
        
        {% if request.user.is_authenticated %}
            <a href="{% url 'dashboard' %}" class="inline-block bg-green-600 hover:bg-green-500 text-while font-semibold py-4 px-10 rounded-full shadow-lg transition duration-300 transform hover:-translate-y-0.5">
                Ir al Panel de Control <i class="fa-solid fa-arrow-right ml-2"></i>
            </a>
        {% else %}
            <a href="{% url 'login' %}" class="inline-block bg-blue-600 hover:bg-blue-500 text-white font-semibold py-4 px-10 rounded-2xl shadow-lg transition duration-300 transform hover:-translate-y-0.5">
                Ingresar al Sistema
            </a>
        {% endif %}
    </div>

</body>
</html>
